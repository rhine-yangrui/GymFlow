name: GymFlow
options:
  bundleIdPrefix: com.rhinee
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: GymFlow
    TARGETED_DEVICE_FAMILY: 1
targets:
  GymFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GymFlow
        excludes:
          - .git
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: GymFlow
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        PRODUCT_BUNDLE_IDENTIFIER: com.rhinee.GymFlow
        SUPPORTS_MACCATALYST: NO
